services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: gin-api

    ports:
      - "8080:8080"

    environment:
      PORT: 8080
      GIN_MODE: release

    restart: unless-stopped

    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine

    container_name: postgres-db

    ports:
      - "5432:5432"

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: